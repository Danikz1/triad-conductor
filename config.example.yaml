# triad-conductor configuration (example)
project:
  name: "triad-conductor"
  # Base branch to start runs from (must exist locally)
  base_branch: "main"

run_limits:
  # Hard circuit breakers (the conductor must enforce these)
  max_wall_time_minutes: 90
  max_total_cost_usd: 25
  max_total_tool_calls: 200

phase_limits:
  propose:
    timeout_minutes: 8
  build:
    max_iterations: 5
    max_stuck_replans: 1
  cross_check:
    max_review_loops: 3
  optimize:
    enabled: true
    max_passes: 2

tournament_mode:
  enabled: true
  # Only trigger tournament if at least one condition is met:
  trigger_if:
    - "stuck_detector_fired_once"
    - "arbiter_requests_tournament"
    - "two_root_cause_hypotheses"

models:
  # You can map these to any providers; the conductor treats them as labels.
  # Optional "model" pins a specific provider model ID/alias.
  proposer_models:
    - { name: "claude",   role: "proposer", model: "opus" }
    - { name: "codex",    role: "proposer", model: "gpt-5.3-codex" }
    - { name: "gemini",   role: "proposer", model: "gemini-2.5-pro" }

  arbiter_model:  { name: "claude",  role: "arbiter", model: "opus" }
  builder_model:  { name: "codex",   role: "builder", model: "gpt-5.3-codex" }
  reviewer_model: { name: "claude",  role: "reviewer", model: "opus" }
  qa_model:       { name: "gemini",  role: "qa", model: "gemini-2.5-pro" }
  optimizer_models:
    - { name: "claude", role: "optimizer", model: "opus" }
    - { name: "codex",  role: "optimizer", model: "gpt-5.3-codex" }
    - { name: "gemini", role: "optimizer", model: "gemini-2.5-pro" }

git:
  # Branch naming template
  branch_prefix: "run"
  # Worktree folder (the conductor creates subfolders per run_id)
  worktrees_dir: "worktrees"

artifacts:
  runs_dir: "runs"
  store_screenshots: true
  store_test_logs: true
  # Keep raw artifacts local; only send redacted artifacts to models
  redact_before_model: true

security:
  # If true, the conductor will refuse to attach certain file patterns to any model prompt
  denylist_globs:
    - "**/.env"
    - "**/.env.*"
    - "**/*secret*"
    - "**/*key*"
    - "**/id_rsa*"
    - "**/.ssh/**"
    - "**/Library/Keychains/**"
